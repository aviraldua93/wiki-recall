name: devcontext-development
version: "0.1.0"
status: active
description: "Building devcontext itself — the meta-scenario for dogfooding scenario management"
repos:
  - url: https://github.com/aviraldua93/devcontext
    branch: master
    purpose: "DevContext core — scenario engine, skill loader, knowledge search, and CLI"
skills:
  - name: code-review
    source: root
  - name: session-management
    source: root
  - name: ci-monitor
    source: root
knowledge:
  - name: a2a-protocol
    scope: scenario
  - name: bun-runtime
    scope: global
context:
  summary: "Dogfooding devcontext by using it to manage its own development. This meta-scenario validates the full lifecycle — scenario creation, skill loading, knowledge entity authoring, context handoff, and session persistence. Every feature added to devcontext is immediately tested by using it in this scenario."
  open_prs: []
  next_steps:
    - "Implement scenario diff command to show context changes between sessions"
    - "Add knowledge entity search with fuzzy matching and tag filtering"
    - "Build scenario export/import for sharing configurations across machines"
    - "Add schema validation on scenario load with actionable error messages"
    - "Write end-to-end test for full scenario lifecycle (create → activate → handoff → archive)"
  blockers: []
  notes: "Dogfooding reveals friction points that synthetic tests miss. Key insight: scenario context summaries need to be auto-updated after each session, not manually maintained. The handoff workflow is the most valuable feature — resuming work in a new session with full context restored takes seconds instead of minutes of re-orientation."
