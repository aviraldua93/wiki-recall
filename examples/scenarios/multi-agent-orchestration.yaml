name: multi-agent-orchestration
version: "0.1.0"
status: active
description: "A2A multi-agent system with orchestrator, worker agents, and docs-as-bus communication"
repos:
  - url: https://github.com/example-org/agent-orchestrator
    branch: main
    purpose: "Central orchestrator that decomposes tasks and assigns to worker agents"
  - url: https://github.com/example-org/agent-workers
    branch: feature/code-review-agent
    purpose: "Worker agent implementations — code review, test writer, docs generator"
  - url: https://github.com/example-org/agent-shared
    branch: main
    purpose: "Shared protocols, message schemas, and A2A type definitions"
skills:
  - name: multi-agent
    source: root
  - name: code-review
    source: root
  - name: ci-monitor
    source: root
  - name: session-management
    source: root
knowledge:
  - name: a2a-protocol
    scope: scenario
  - name: docs-as-bus-pattern
    scope: scenario
context:
  summary: "Building A2A orchestrator with 3 worker agents. Orchestrator dispatches tasks via artifacts directory. Code review agent complete, working on test writer agent."
  open_prs:
    - "agent-orchestrator#15"
    - "agent-workers#8"
  next_steps:
    - "Implement test-writer agent that generates unit tests from source analysis"
    - "Add health monitoring for stalled agents (no artifact after 5 min timeout)"
    - "Write integration test for full orchestrator → worker → artifact pipeline"
    - "Document the docs-as-bus protocol in agent-shared README"
  blockers: []
  notes: "Using file-based artifacts rather than HTTP for inter-agent communication — simpler to debug and replay. Each agent writes a structured Markdown artifact to artifacts/ when done."
